name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for the release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve version from tag
        id: version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-arm64:
    needs: resolve-version
    runs-on: macos-26
    outputs:
      sha256: ${{ steps.sha.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v6

      - name: Import signing certificate
        env:
          CERT_B64: ${{ secrets.BUILD_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.BUILD_CERT_PASSWORD }}
          KC_PW: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERT_B64" | base64 -d > cert.p12
          security create-keychain -p "$KC_PW" build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KC_PW" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PW" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KC_PW" build.keychain
          rm cert.p12

      - name: Build & archive
        run: |
          xcodebuild -project LensBar/LensBar.xcodeproj \
            -scheme LensBar -configuration Release \
            -destination "platform=macOS,arch=arm64" \
            -archivePath build/LensBar.xcarchive archive \
            MARKETING_VERSION="${{ needs.resolve-version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGN_IDENTITY="${{ secrets.DEVELOPER_ID_IDENTITY }}" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.DEVELOPMENT_TEAM }}" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime"

      - name: Export .app
        run: |
          xcodebuild -exportArchive \
            -archivePath build/LensBar.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Notarize & staple app
        env:
          P8_B64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          echo "$P8_B64" | base64 -d > key.p8
          ditto -c -k --keepParent build/export/LensBar.app LensBar.zip
          xcrun notarytool submit LensBar.zip \
            --key key.p8 --key-id "$KEY_ID" --issuer "$ISSUER_ID" \
            --wait
          xcrun stapler staple build/export/LensBar.app

      - name: Package, sign, notarize & staple DMG
        env:
          KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          hdiutil create -volname LensBar -srcfolder build/export/LensBar.app \
            -ov -format UDZO LensBar.dmg
          codesign --sign "${{ secrets.DEVELOPER_ID_IDENTITY }}" \
            --timestamp LensBar.dmg
          xcrun notarytool submit LensBar.dmg \
            --key key.p8 --key-id "$KEY_ID" --issuer "$ISSUER_ID" \
            --wait
          xcrun stapler staple LensBar.dmg
          rm key.p8

      - name: Compute checksum
        id: sha
        run: echo "sha256=$(shasum -a 256 LensBar.dmg | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: LensBar.dmg
          path: LensBar.dmg

  build-universal:
    needs: resolve-version
    runs-on: macos-14
    outputs:
      sha256: ${{ steps.sha.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v6

      - name: Import signing certificate
        env:
          CERT_B64: ${{ secrets.BUILD_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.BUILD_CERT_PASSWORD }}
          KC_PW: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERT_B64" | base64 -d > cert.p12
          security create-keychain -p "$KC_PW" build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KC_PW" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PW" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KC_PW" build.keychain
          rm cert.p12

      - name: Build & archive
        run: |
          xcodebuild -project LensBar/LensBar.xcodeproj \
            -scheme LensBar -configuration Release \
            -destination "platform=macOS" \
            -archivePath build/LensBar.xcarchive archive \
            ARCHS="arm64 x86_64" \
            MARKETING_VERSION="${{ needs.resolve-version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGN_IDENTITY="${{ secrets.DEVELOPER_ID_IDENTITY }}" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.DEVELOPMENT_TEAM }}" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime"

      - name: Export .app
        run: |
          xcodebuild -exportArchive \
            -archivePath build/LensBar.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Notarize & staple app
        env:
          P8_B64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          echo "$P8_B64" | base64 -d > key.p8
          ditto -c -k --keepParent build/export/LensBar.app LensBar.zip
          xcrun notarytool submit LensBar.zip \
            --key key.p8 --key-id "$KEY_ID" --issuer "$ISSUER_ID" \
            --wait
          xcrun stapler staple build/export/LensBar.app

      - name: Package, sign, notarize & staple DMG
        env:
          KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          hdiutil create -volname LensBar -srcfolder build/export/LensBar.app \
            -ov -format UDZO LensBar-universal.dmg
          codesign --sign "${{ secrets.DEVELOPER_ID_IDENTITY }}" \
            --timestamp LensBar-universal.dmg
          xcrun notarytool submit LensBar-universal.dmg \
            --key key.p8 --key-id "$KEY_ID" --issuer "$ISSUER_ID" \
            --wait
          xcrun stapler staple LensBar-universal.dmg
          rm key.p8

      - name: Compute checksum
        id: sha
        run: echo "sha256=$(shasum -a 256 LensBar-universal.dmg | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: LensBar-universal.dmg
          path: LensBar-universal.dmg

  publish-release:
    needs: [resolve-version, build-arm64, build-universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: LensBar.dmg

      - uses: actions/download-artifact@v4
        with:
          name: LensBar-universal.dmg

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            LensBar.dmg
            LensBar-universal.dmg
          tag_name: ${{ needs.resolve-version.outputs.tag }}

  update-homebrew-tap:
    needs: [resolve-version, build-arm64, build-universal, publish-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout tap
        uses: actions/checkout@v6
        with:
          repository: andrew-craig/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render cask
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
          ARM_SHA256: ${{ needs.build-arm64.outputs.sha256 }}
          INTEL_SHA256: ${{ needs.build-universal.outputs.sha256 }}
        run: |
          sed \
            -e "s/__VERSION__/${VERSION}/g" \
            -e "s/__ARM_SHA256__/${ARM_SHA256}/g" \
            -e "s/__INTEL_SHA256__/${INTEL_SHA256}/g" \
            Casks/lensbar.rb.tmpl > tap/Casks/lensbar.rb

      - name: Commit & push
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/lensbar.rb
          if git diff --cached --quiet; then
            echo "No cask changes to commit"
            exit 0
          fi
          git commit -m "lensbar ${VERSION}"
          git push
